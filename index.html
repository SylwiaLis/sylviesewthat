<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sylvie Sew That</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Caveat:wght@400;500&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ed;
      --bg2: #ffffff;
      --sage: #5e8a78;
      --sage-light: #7a9e8e;
      --sage-muted: #4a6b5e;
      --off-white: #f5f2ed;
      --warm-grey: #8a847a;
      --text: #2a2a25;
      --border: rgba(94, 138, 120, 0.2);
    }

    body {
      background-color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(94, 138, 120, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(94, 138, 120, 0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3.5rem 2rem 4rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .avatar-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(var(--sage), var(--sage-muted), var(--sage));
      margin-bottom: 1.4rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #ccc;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .name em {
      font-style: italic;
      color: var(--sage-light);
    }

    .handle {
      font-family: 'Caveat', cursive;
      font-size: 1.05rem;
      color: var(--sage);
      margin-top: 0.3rem;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .tagline {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--warm-grey);
      margin-top: 0.5rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.7s 0.38s ease both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 1.8rem 0;
      width: 100%;
      max-width: 220px;
      opacity: 0;
      animation: fadeUp 0.6s 0.45s ease both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sage-muted), transparent);
    }
    .divider-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--sage);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      width: 100%;
      max-width: 360px;
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.2rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 400;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      overflow: hidden;
      opacity: 0;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(122, 158, 142, 0.08), transparent 55%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(94, 138, 120, 0.5);
      box-shadow: 0 6px 20px rgba(94,138,120,0.15), 0 0 0 1px rgba(94,138,120,0.1);
    }
    .link-btn:active { transform: translateY(0); }

    .link-btn .icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { width: 17px; height: 17px; fill: white; }

    .link-btn .label { flex: 1; text-align: left; }
    .link-btn .label small {
      display: block;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--warm-grey);
      margin-top: 1px;
    }

    .link-btn .arrow {
      font-size: 0.9rem;
      color: var(--sage);
      transition: transform 0.2s ease;
    }
    .link-btn:hover .arrow { transform: translateX(3px); }

    .link-btn:nth-child(1) { animation: fadeUp 0.6s 0.52s ease both; }
    .link-btn:nth-child(2) { animation: fadeUp 0.6s 0.62s ease both; }
    .link-btn:nth-child(3) { animation: fadeUp 0.6s 0.72s ease both; }
    .link-btn:nth-child(4) { animation: fadeUp 0.6s 0.82s ease both; }
    .link-btn:nth-child(5) { animation: fadeUp 0.6s 0.92s ease both; }

    .icon-ig  { background: linear-gradient(135deg, #f9a857, #e05d8a, #8b3fa0); }
    .icon-tt  { background: #010101; border: 1px solid #333; }
    .icon-yt  { background: #ff0000; }
    .icon-pin { background: #e60023; }
    .icon-etsy{ background: #f1641e; }

    .badge {
      font-family: 'Caveat', cursive;
      font-size: 0.82rem;
      color: var(--sage);
      margin-right: 0.2rem;
    }

    .link-btn--featured {
      background: var(--sage);
      border-color: var(--sage);
      color: white;
      font-weight: 500;
    }
    .link-btn--featured .label small { color: rgba(255,255,255,0.75); }
    .link-btn--featured .arrow { color: white; }
    .link-btn--featured:hover {
      background: var(--sage-muted);
      border-color: var(--sage-muted);
      box-shadow: 0 6px 20px rgba(94,138,120,0.35);
    }
    .link-btn--featured::before {
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 55%);
    }

    .icon-free { background: rgba(255,255,255,0.2); }

    .coming-soon {
      opacity: 0.45;
      cursor: default;
      pointer-events: none;
    }

    .footer {
      margin-top: 2.5rem;
      font-family: 'Caveat', cursive;
      font-size: 0.95rem;
      color: var(--sage-muted);
      opacity: 0;
      animation: fadeUp 0.6s 1.05s ease both;
      letter-spacing: 0.04em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
  </style>
</head>
